[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100
known_third_party = [
    "alembic",
    "bs4",
    "chromadb",
    "fastapi",
    "markdown",
    "openai",
    "pydantic",
    "pydantic_settings",
    "requests",
    "sentence_transformers",
    "sqlalchemy",
    "structlog",
    "tiktoken",
    "urllib3",
    "uvicorn",
]
known_first_party = ["app"]

[tool.flake8]
max-line-length = 100
extend-ignore = ["E203", "W503"]
per-file-ignores = [
    "__init__.py:F401",
]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
